name: AccessPulse CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  test-and-audit:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run test suite
        run: swift test

      - name: Generate markdown accessibility report
        id: audit_markdown
        continue-on-error: true
        run: swift run accesspulse audit --path Sources --exclude AccessPulseExamples --format markdown > accesspulse-report.md

      - name: Generate SARIF accessibility report
        id: audit_sarif
        continue-on-error: true
        run: swift run accesspulse audit --path Sources --exclude AccessPulseExamples --format sarif > accesspulse.sarif

      - name: Upload markdown report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accesspulse-report
          path: accesspulse-report.md

      - name: Upload SARIF to GitHub code scanning
        if: always() && hashFiles('accesspulse.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: accesspulse.sarif

      - name: Enforce audit gate
        if: always()
        run: |
          if [ "${{ steps.audit_markdown.outcome }}" = "failure" ] || [ "${{ steps.audit_sarif.outcome }}" = "failure" ]; then
            echo "AccessPulse audit found warnings or errors."
            exit 1
          fi
